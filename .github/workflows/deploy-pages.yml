name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Derive base path
        id: base
        run: |
          # For "user.github.io" repos the site lives at the domain root
          # (base = "/"); for any other repo it lives at "/<repo>/".
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (static client bundle for GitHub Pages)
        env:
          DEPLOY_TARGET: github-pages
          VITE_BASE_PATH: ${{ steps.base.outputs.path }}
        run: bun run build

      - name: Ensure SPA shell + 404 fallback
        env:
          BASE_PATH: ${{ steps.base.outputs.path }}
        run: |
          cd .output/public
          # The client build emits a static SPA shell as index.html. If for any
          # reason it is absent, synthesize a minimal one that boots the client
          # bundle so the deploy never ships a broken site.
          if [ ! -f index.html ]; then
            JS=$(ls assets/index-*.js 2>/dev/null | head -n1)
            CSS=$(ls assets/styles-*.css 2>/dev/null | head -n1)
            echo "::warning::index.html missing from client build; synthesizing SPA shell (js=$JS css=$CSS)"
            cat > index.html <<HTMLEOF
          <!doctype html>
          <html lang="en" class="dark"><head>
          <meta charset="utf-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1" />
          <meta name="theme-color" content="#0b1120" />
          <link rel="icon" href="${BASE_PATH}favicon.ico" />
          ${CSS:+<link rel="stylesheet" href="${BASE_PATH}${CSS}" />}
          </head>
          <body><script type="module" src="${BASE_PATH}${JS}"></script></body>
          </html>
          HTMLEOF
          fi
          test -f index.html || { echo "::error::index.html missing — client build did not emit an SPA shell"; exit 1; }
          # GitHub Pages needs a 404.html that re-serves the app for deep links.
          cp index.html 404.html
          touch .nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4